# Inert documentation example. Copy this file into your repository as
# .github/workflows/anchormap.yml. Preview versions are pinned intentionally.

name: AnchorMap

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  anchormap:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Run AnchorMap
        uses: fstepho/anchormap-action@v0-preview.4
        with:
          anchormap-version: "1.2.2"
          node-version: "22"
          policy: anchormap.policy.yaml
          upload-artifacts: "true"
          fail-on-policy: "true"
