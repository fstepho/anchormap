# Inert documentation example. Copy this file into your repository as
# .github/workflows/anchormap.yml. Preview versions are pinned intentionally.
# The baseline scan is an explicit local input, not a Git ref or fetched
# workflow artifact.

name: AnchorMap

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  anchormap:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Run AnchorMap with explicit baseline
        uses: fstepho/anchormap-action@v0-preview.3
        with:
          anchormap-version: "1.2.2"
          node-version: "22"
          policy: anchormap.policy.yaml
          base-scan: .anchormap/baseline.scan.json
          upload-artifacts: "true"
          fail-on-policy: "true"
