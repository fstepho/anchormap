name: T9.3 Cross-Platform Evidence

on:
  workflow_dispatch:
  pull_request:
    paths:
      - ".github/workflows/t9-3-cross-platform-linux.yml"
      - "bench/**"
      - "bin/**"
      - "docs/adr/**"
      - "docs/contract.md"
      - "docs/design.md"
      - "docs/evals.md"
      - "docs/tasks.md"
      - "fixtures/**"
      - "package-lock.json"
      - "package.json"
      - "scripts/**"
      - "src/**"
      - "tsconfig.json"

permissions:
  contents: read

jobs:
  linux-x86-64:
    name: Linux x86_64 release-gate evidence
    runs-on: ubuntu-24.04
    timeout-minutes: 120
    env:
      T9_3_REPORT_DIR: reports/t9.3/linux-x86_64
      T9_4_REPORT_DIR: reports/t9.4/linux-x86_64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Assert native platform
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$T9_3_REPORT_DIR"
          platform="$(uname -sm)"
          printf '%s\n' "$platform" | tee "$T9_3_REPORT_DIR/uname.txt"
          test "$platform" = "Linux x86_64"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install locked dependencies
        run: npm ci

      - name: Record toolchain
        shell: bash
        run: |
          set -euo pipefail
          {
            printf 'node: '
            node --version
            printf 'npm: '
            npm --version
            printf 'typescript: '
            npx tsc --version
          } | tee "$T9_3_REPORT_DIR/toolchain.txt"

      - name: Build release candidate
        shell: bash
        run: |
          set -euo pipefail
          npm run build 2>&1 | tee "$T9_3_REPORT_DIR/build.log"

      - name: Level B fixtures and YAML write goldens
        shell: bash
        run: |
          set -euo pipefail
          npm run test:fixtures:all 2>&1 | tee "$T9_3_REPORT_DIR/level-b-fixtures.log"

      - name: JSON stdout golden byte checks
        shell: bash
        run: |
          set -euo pipefail
          npm run check:goldens 2>&1 | tee "$T9_3_REPORT_DIR/goldens.log"

      - name: C1-C12 metamorphic and isolation tests
        shell: bash
        run: |
          set -euo pipefail
          npm run test:metamorphic 2>&1 | tee "$T9_3_REPORT_DIR/c1-c12.log"

      - name: Native atomic write cleanup and rename-boundary probe
        shell: bash
        run: |
          set -euo pipefail
          node --test "dist/infra/config-io.test.js" 2>&1 | tee "$T9_3_REPORT_DIR/atomic-write-rename-boundary.log"

      - name: T9.4 Gate F release benchmark
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$T9_4_REPORT_DIR"
          npm run bench:release -- --out-dir "$T9_4_REPORT_DIR" 2>&1 | tee "$T9_4_REPORT_DIR/bench-release.log"

      - name: Validate T9.4 Linux x86_64 report
        shell: bash
        run: |
          set -euo pipefail
          node scripts/validate-release-benchmark-report.mjs --require-platform linux:x64 "$T9_4_REPORT_DIR/gate-f-report.json" 2>&1 | tee "$T9_4_REPORT_DIR/bench-validate.log"

      - name: Archive fixture runner artifacts
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          if test -d .tmp/fixture-runs; then
            find .tmp/fixture-runs -type f -print0 | sort -z | xargs -0 -r sha256sum > "$T9_3_REPORT_DIR/fixture-run-artifacts.sha256"
          else
            printf '.tmp/fixture-runs absent\n' > "$T9_3_REPORT_DIR/fixture-run-artifacts.sha256"
          fi

      - name: Archive T9.3 Linux x86_64 report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: t9-3-linux-x86-64-report
          path: |
            reports/t9.3/linux-x86_64/**
            .tmp/fixture-runs/**
          include-hidden-files: true
          if-no-files-found: error

      - name: Archive T9.4 Linux x86_64 report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: t9-4-linux-x86-64-report
          path: reports/t9.4/linux-x86_64/**
          if-no-files-found: error

  macos-arm64:
    name: macOS arm64 release-gate evidence
    runs-on: macos-15
    timeout-minutes: 120
    env:
      T9_3_REPORT_DIR: reports/t9.3/macos-arm64
      T9_4_REPORT_DIR: reports/t9.4/macos-arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Assert native platform
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$T9_3_REPORT_DIR"
          platform="$(uname -sm)"
          printf '%s\n' "$platform" | tee "$T9_3_REPORT_DIR/uname.txt"
          test "$platform" = "Darwin arm64"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install locked dependencies
        run: npm ci

      - name: Record toolchain
        shell: bash
        run: |
          set -euo pipefail
          {
            printf 'node: '
            node --version
            printf 'npm: '
            npm --version
            printf 'typescript: '
            npx tsc --version
          } | tee "$T9_3_REPORT_DIR/toolchain.txt"

      - name: Build release candidate
        shell: bash
        run: |
          set -euo pipefail
          npm run build 2>&1 | tee "$T9_3_REPORT_DIR/build.log"

      - name: Level B fixtures and YAML write goldens
        shell: bash
        run: |
          set -euo pipefail
          npm run test:fixtures:all 2>&1 | tee "$T9_3_REPORT_DIR/level-b-fixtures.log"

      - name: JSON stdout golden byte checks
        shell: bash
        run: |
          set -euo pipefail
          npm run check:goldens 2>&1 | tee "$T9_3_REPORT_DIR/goldens.log"

      - name: C1-C12 metamorphic and isolation tests
        shell: bash
        run: |
          set -euo pipefail
          npm run test:metamorphic 2>&1 | tee "$T9_3_REPORT_DIR/c1-c12.log"

      - name: Native atomic write cleanup and rename-boundary probe
        shell: bash
        run: |
          set -euo pipefail
          node --test "dist/infra/config-io.test.js" 2>&1 | tee "$T9_3_REPORT_DIR/atomic-write-rename-boundary.log"

      - name: T9.4 Gate F release benchmark
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$T9_4_REPORT_DIR"
          npm run bench:release -- --out-dir "$T9_4_REPORT_DIR" 2>&1 | tee "$T9_4_REPORT_DIR/bench-release.log"

      - name: Validate T9.4 macOS arm64 report
        shell: bash
        run: |
          set -euo pipefail
          node scripts/validate-release-benchmark-report.mjs --require-platform darwin:arm64 "$T9_4_REPORT_DIR/gate-f-report.json" 2>&1 | tee "$T9_4_REPORT_DIR/bench-validate.log"

      - name: Archive fixture runner artifacts
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          if test -d .tmp/fixture-runs; then
            find .tmp/fixture-runs -type f -print0 | sort -z | xargs -0 shasum -a 256 > "$T9_3_REPORT_DIR/fixture-run-artifacts.sha256"
          else
            printf '.tmp/fixture-runs absent\n' > "$T9_3_REPORT_DIR/fixture-run-artifacts.sha256"
          fi

      - name: Archive T9.3 macOS arm64 report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: t9-3-macos-arm64-report
          path: |
            reports/t9.3/macos-arm64/**
            .tmp/fixture-runs/**
          include-hidden-files: true
          if-no-files-found: error

      - name: Archive T9.4 macOS arm64 report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: t9-4-macos-arm64-report
          path: reports/t9.4/macos-arm64/**
          if-no-files-found: error

  t9-4-supported-platform-artifacts:
    name: Validate T9.4 supported-platform benchmark artifacts
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    needs:
      - linux-x86-64
      - macos-arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Download T9.4 Linux x86_64 report
        uses: actions/download-artifact@v4
        with:
          name: t9-4-linux-x86-64-report
          path: reports/t9.4/linux-x86_64

      - name: Download T9.4 macOS arm64 report
        uses: actions/download-artifact@v4
        with:
          name: t9-4-macos-arm64-report
          path: reports/t9.4/macos-arm64

      - name: Validate T9.4 supported-platform artifact set
        run: npm run bench:validate:artifacts
