name: T9.3 Linux x86_64 Cross-Platform Evidence

on:
  workflow_dispatch:
  pull_request:
    paths:
      - ".github/workflows/t9-3-cross-platform-linux.yml"
      - "fixtures/**"
      - "package-lock.json"
      - "package.json"
      - "scripts/**"
      - "src/**"
      - "tsconfig.json"

permissions:
  contents: read

jobs:
  linux-x86-64:
    name: Linux x86_64 release-gate evidence
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    env:
      T9_3_REPORT_DIR: reports/t9.3/linux-x86_64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Assert native platform
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$T9_3_REPORT_DIR"
          platform="$(uname -sm)"
          printf '%s\n' "$platform" | tee "$T9_3_REPORT_DIR/uname.txt"
          test "$platform" = "Linux x86_64"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install locked dependencies
        run: npm ci

      - name: Record toolchain
        shell: bash
        run: |
          set -euo pipefail
          {
            printf 'node: '
            node --version
            printf 'npm: '
            npm --version
            printf 'typescript: '
            npx tsc --version
          } | tee "$T9_3_REPORT_DIR/toolchain.txt"

      - name: Build release candidate
        shell: bash
        run: |
          set -euo pipefail
          npm run build 2>&1 | tee "$T9_3_REPORT_DIR/build.log"

      - name: Level B fixtures and YAML write goldens
        shell: bash
        run: |
          set -euo pipefail
          npm run test:fixtures:all 2>&1 | tee "$T9_3_REPORT_DIR/level-b-fixtures.log"

      - name: JSON stdout golden byte checks
        shell: bash
        run: |
          set -euo pipefail
          npm run check:goldens 2>&1 | tee "$T9_3_REPORT_DIR/goldens.log"

      - name: C1-C12 metamorphic and isolation tests
        shell: bash
        run: |
          set -euo pipefail
          npm run test:metamorphic 2>&1 | tee "$T9_3_REPORT_DIR/c1-c12.log"

      - name: Native atomic write cleanup and rename-boundary probe
        shell: bash
        run: |
          set -euo pipefail
          node --test "dist/infra/config-io.test.js" 2>&1 | tee "$T9_3_REPORT_DIR/atomic-write-rename-boundary.log"

      - name: Archive fixture runner artifacts
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          if test -d fixtures/.runs; then
            find fixtures/.runs -type f -print0 | sort -z | xargs -0 -r sha256sum > "$T9_3_REPORT_DIR/fixture-run-artifacts.sha256"
          else
            printf 'fixtures/.runs absent\n' > "$T9_3_REPORT_DIR/fixture-run-artifacts.sha256"
          fi

      - name: Archive T9.3 Linux x86_64 report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: t9-3-linux-x86-64-report
          path: |
            reports/t9.3/linux-x86_64/**
            fixtures/.runs/**
          if-no-files-found: error
